<div class="w-full bg-blue-500 flex gap-2 h-full">
  <app-menuboard-display-mode
    [selectedMode]="selectedMode()"
    (modeChanged)="modeChanged($event)"
  ></app-menuboard-display-mode>

  <mat-checkbox [checked]="isEditingAllowed()" (change)="editingModeChanged($event.checked)"
    >Editieren</mat-checkbox
  >

  <button mat-icon-button [matMenuTriggerFor]="sortMenu">
    <svg lucideArrowDownWideNarrow></svg>
  </button>

  <mat-menu #sortMenu="matMenu">
    <ng-template matMenuContent>
      <div (click)="$event.stopPropagation()">
        <app-sort-by-menu-settings />
      </div>
    </ng-template>
  </mat-menu>

  <!-- <app-login /> -->

  @if (!isLoggedIn()) {
    <button hlmBtn variant="outline" (click)="openAuthDialog('Login')">Anmelden</button>
    <button hlmBtn variant="outline" (click)="openAuthDialog('Register')">Registrieren</button>
  } @else {
    <button hlmBtn variant="outline" (click)="logout()">Abmelden</button>

    <div class="bg-amber-200 rounded-md border-4 text-lg h-fit">{{ loggedInUser() }}</div>
  }

  <button hlmBtn variant="outline" (click)="fetchRestaurants()">fetch restaurants</button>
</div>
