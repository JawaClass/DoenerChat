<h1 class="text-2xl pt-4 pb-4">Passwort zurücksetzen</h1>

@if (!isResetTokenValid()) {
  <hlm-alert variant="destructive">
    <h4 hlmAlertDescription>
      Der Link zum zurückzusetzen des Passworts ist abgelaufen. Bitte gehe zur Seite zum
      Zurücksetzen des Passworts und versuche es erneut.
    </h4>
  </hlm-alert>
}
<hlm-field-group class="mt-2">
  <app-password-input-field
    label="Passwort eingeben"
    [passwordField]="resetPasswordForm.password"
  />

  <app-password-input-field
    label="Passwort erneut eingeben"
    [passwordField]="resetPasswordForm.passwordConfirm"
  />
</hlm-field-group>

<button
  class="mt-2"
  hlmBtn
  type="submit"
  (click)="changePassword()"
  [disabled]="!resetPasswordForm().valid() || !isResetTokenValid()"
>
  Passwort ändern
</button>
