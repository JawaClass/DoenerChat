<div class="flex flex-col h-16 bg-mist-100">
  <h2 class="font-medium text-2xl m-auto">Meine Restaurants</h2>
  <hlm-separator />
</div>

<ng-scrollbar hlm class="flex-1 border whitespace-nowrap">
  <div class="flex flex-col flex-1">
    <button hlmBtn size="sm" (click)="createNewRestaurant()">
      <ng-icon name="lucidePlus" />
      Neues Restaurant
    </button>
    @for (r of restaurants(); track $index) {
      <hlm-item class="cursor-pointer">
        <hlm-item-media variant="icon">
          <ng-icon name="lucideBadgeCheck" />
        </hlm-item-media>
        <hlm-item-content>
          <hlm-item-title>{{ r.name }}</hlm-item-title>
          <hlm-item-description>Description</hlm-item-description>
        </hlm-item-content>
        <hlm-item-actions>
          <button hlmBtn (click)="openRestaurant(r)">
            <ng-icon name="lucideDoorOpen" />
          </button>
        </hlm-item-actions>
      </hlm-item>
      <hlm-separator />
    }
  </div>
</ng-scrollbar>
