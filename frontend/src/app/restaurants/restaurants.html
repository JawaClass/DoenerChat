@if (restaurants.isLoading()) {
  loading...
}

@if (restaurants.hasValue()) {
  @if (restaurants.value().length === 0) {
    <app-restaurants-create-first class="m-auto" />
  }

  @if (restaurants.value().length > 0) {
    <div class="flex gap-1 h-full flex-1 w-full min-w-0! min-h-0!">
      <div class="pr-2">
        <app-restaurants-list
          class="h-full max-h-full overflow-auto"
          [restaurants]="restaurants.value()"
        />
      </div>
      <hlm-separator orientation="vertical" />

      <!-- SHOW new-restaurant mapped component here -->

      <div class="flex flex-col flex-1 min-w-0! min-h-0!">
        <div
          class="bg-blue-200 flex flex-1 border-8 border-emerald-400 min-w-0! min-h-0!"
        >

          <router-outlet />
          <!-- <div class="bg-orange-400 w-[8000px] h-[100px]"></div> -->
        </div>
      </div>
    </div>
  }
}
