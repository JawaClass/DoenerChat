@let authScreen_ = authScreen();

<!-- <p>user-auth-screen works! {{ authScreen_ }}</p> -->

@if (authScreen_ == 'Login') {
  <app-login />
}

@if (authScreen_ == 'ResetPassword') {
  <app-reset-password />
}

@if (authScreen_ == 'Register') {
  <app-register />
}

@if (authScreen_ == 'ConfirmRegistrationEmail') {
  <app-confirm-registration-email />
}
