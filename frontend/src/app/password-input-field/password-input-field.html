@let passwordField_ = passwordField();
<hlm-field>
  <label hlmFieldLabel for="password">{{ label() }}</label>
  <hlm-input-group>
    <input
      hlmInputGroupInput
      [type]="showPassword() ? null : 'password'"
      id="password"
      autocomplete="current-password"
      [formField]="passwordField_"
    />
    <hlm-input-group-addon align="inline-end">
      <button
        hlmBtn
        size="icon"
        variant="outline"
        (click)="toggleShowPassword()"
        class="border-none h-fit"
      >
        <ng-icon [name]="showPassword() ? 'lucideEyeOff' : 'lucideEye'" />
      </button>
    </hlm-input-group-addon>
  </hlm-input-group>

  <hlm-field-error [forceShow]="passwordField_().invalid() && passwordField_().touched()">
    @for (error of passwordField_().errors(); track error.kind) {
      <span>{{ error.message }}</span>
    }
  </hlm-field-error>
</hlm-field>
