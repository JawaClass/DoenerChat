@let basket_ = basket;

<div class="flex flex-col justify-between h-full bg-blue-300">
    <div>Anzahl: {{basket_.items().length}}</div>

    <div class="flex flex-col gap-1 flex-1 overflow-auto">
        @for (item of basket_.items(); track $index) {
                <!-- <app-basket-item-display [item]="item"></app-basket-item-display> -->
            <app-back-item-group-display [item]="item"></app-back-item-group-display>
        
            }
    </div>

    <div class="flex-col gap-2 bg-green-300">
        <div>Total Prep Time: {{basket_.totalPrepTime()}}</div>
        <div>Total Price: {{basket_.totalPrice()}}</div>
    </div>
</div>
