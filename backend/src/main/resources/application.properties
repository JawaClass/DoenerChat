spring.application.name=doener

# Postgres connection (matches your docker-compose service 'db')
spring.datasource.url=jdbc:postgresql://db:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Optional JPA/Hibernate settings
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# logging  
logging.level.org.springframework.security=DEBUG

# sessions
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
server.servlet.session.cookie.max-age=7d

# mail
# should automatically create a JavaMailSender bean
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=Doenerchat@gmail.com
spring.mail.password=pjnsdsuxcpuomlss
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true

# app
app.frontend.base-url=http://localhost:4200
app.frontend.password-reset-route=/account/password-reset

